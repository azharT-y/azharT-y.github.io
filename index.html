<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>خريطة المستشفيات والمراكز الصحية</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; }
        #map { width: 100%; height: 100vh; }
        .legend {
            background: white;
            padding: 10px;
            border-radius: 5px;
            box-shadow: 0 0 10px rgba(0,0,0,0.5);
            font-size: 14px;
            line-height: 1.8em;
        }
        .legend i {
            width: 20px;
            height: 20px;
            display: inline-block;
            margin-right: 8px;
            background-size: cover;
        }
    </style>
</head>
<body>
    <div id="map"></div>

    <script>
        // إعداد الخريطة
        var map = L.map('map').setView([31.9, 35.2], 12);

        // إضافة طبقة OpenStreetMap
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; OpenStreetMap contributors'
        }).addTo(map);

        // أيقونة المستشفيات
        var hospitalIcon = L.icon({
            iconUrl: 'https://i.imgur.com/eLczvma.png', // استبدل برابط صورة الأيقونة الحمراء
            iconSize: [40, 40],
            iconAnchor: [20, 40],
            popupAnchor: [0, -40]
        });

        // تحميل مضلع محافظة رام الله
        fetch('RamallahZones.json')
            .then(response => response.json())
            .then(data => {
                L.geoJSON(data, {
                    style: { color: "blue", weight: 2, fillColor: "cyan", fillOpacity: 0.3 }
                }).bindPopup("محافظة رام الله").addTo(map);
            })
            .catch(error => console.error("خطأ في تحميل ملف RamallahZones.json:", error));

        // بيانات المستشفيات
        var hospitals = [
            { name: "مجمع فلسطين الطبي", coordinates: [31.9063, 35.2124] },
            { name: "مستشفى الرعاية التخصصي", coordinates: [31.9044, 35.2094] },
            { name: "مستشفى د. درغام", coordinates: [31.9084, 35.2064] },
            { name: "مستشفى المستقبل", coordinates: [31.9124, 35.2214] },
            { name: "المركز الصحي العربي", coordinates: [31.9124, 35.2264] },
            { name: "مستشفى الهلال الأحمر", coordinates: [31.9014, 35.2134] },
            { name: "مستشفى الناصر للولادة", coordinates: [31.9044, 35.2144] },
            { name: "مستشفى الرازي", coordinates: [31.9034, 35.2174] },
            { name: "مستشفى مسلم التخصصي", coordinates: [31.9024, 35.2164] },
            { name: "مركز الراجحي الطبي", coordinates: [31.9014, 35.2184] },
            { name: "مستشفى الهلال الأحمر", coordinates: [31.9034, 35.2194] },
            { name: "مستشفى خالد", coordinates: [31.9024, 35.2214] },
            { name: "مستشفى أبو ريّا للتأهيل", coordinates: [31.9054, 35.2204] }
        ];

        // عرض المستشفيات على الخريطة
        hospitals.forEach(hospital => {
            L.marker(hospital.coordinates, { icon: hospitalIcon })
                .bindPopup(`<b>${hospital.name}</b>`)
                .addTo(map);
        });

        // إضافة مفتاح الخريطة (Legend)
        var legend = L.control({ position: 'bottomright' });
        legend.onAdd = function (map) {
            var div = L.DomUtil.create('div', 'legend');
            div.innerHTML += '<i style="background-image: url(https://i.imgur.com/eLczvma.png);"></i> مستشفى<br>';
            div.innerHTML += '<i style="background: cyan; border: 1px solid blue; display: inline-block; width: 20px; height: 20px;"></i> محافظة رام الله';
            return div;
        };
        legend.addTo(map);
    </script>
</body>
</html>
