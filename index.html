<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>خريطة المستشفيات والمراكز الصحية</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; }
        #map { width: 100%; height: 100vh; }
        .search-container {
            position: absolute;
            top: 10px;
            left: 10px;
            background: white;
            padding: 10px;
            border-radius: 5px;
            box-shadow: 0 0 10px rgba(0,0,0,0.5);
            z-index: 1000;
        }
        .legend {
            background: white;
            padding: 10px;
            border-radius: 5px;
            box-shadow: 0 0 10px rgba(0,0,0,0.5);
            font-size: 14px;
            line-height: 1.8em;
            position: absolute;
            bottom: 10px;
            right: 10px;
            z-index: 1000;
        }
        .legend span {
            display: inline-block;
            width: 20px;
            height: 20px;
            text-align: center;
            line-height: 20px;
            font-size: 18px;
        }
    </style>
</head>
<body>
    <div id="map"></div>
    <div class="search-container">
        <input type="text" id="search-input" placeholder="ابحث عن مستشفى أو مركز صحي" style="width: 200px; padding: 5px; border: 1px solid #ccc; border-radius: 5px;" />
        <ul id="search-results" style="list-style: none; padding: 0; margin: 0;"></ul>
    </div>

    <script>
        var map = L.map('map').setView([31.9, 35.2], 12);

        // إضافة طبقة OpenStreetMap
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; OpenStreetMap contributors'
        }).addTo(map);

        // تحميل مضلع محافظة رام الله
        fetch('RamallahZones.json')
            .then(response => response.json())
            .then(data => {
                L.geoJSON(data, {
                    style: { color: "blue", weight: 2, fillColor: "cyan", fillOpacity: 0.3 }
                }).bindPopup("محافظة رام الله").addTo(map);
            })
            .catch(error => console.error("خطأ في تحميل ملف RamallahZones.json:", error));

        // بيانات المستشفيات والمراكز الصحية
        var facilities = [
            // البيانات المستخلصة من ملف Hospitals.geojson
            { name_ar: "مجمع فلسطين الطبي", name_en: "Palestine Medical Complex", city: "رام الله", type: "Public", coordinates: [31.898848178094777, 35.20481107919121] },
            { name_ar: "مستشفى الرعاية التخصصي", name_en: "Care Specialist Hospital", city: "رام الله", type: "Private", coordinates: [31.9053793926002, 35.20507828425434] },
            { name_ar: "مستشفى دكتور ضرغام", name_en: "Dr.Dergham Hospital", city: "رام الله", type: "Private", coordinates: [31.897747383972042, 35.2044283261662] },
            { name_ar: "مستشفى المستقبل", name_en: "Al Mustakbal Hospital", city: "البيرة", type: "Public", coordinates: [31.914433044313196, 35.214167418863404] },
            { name_ar: "المركز الصحي العربي", name_en: "Arabic Health Center", city: "البيرة", type: "Public", coordinates: [31.90463383996682, 35.206537250841556] },
            { name_ar: "مستشفى العمري", name_en: "Al Amari Health Center", city: "البيرة", type: "Private", coordinates: [31.89462854715951, 35.21077269461349] },
            { name_ar: "المستشفى الاستشاري العربي", name_en: "Istishari Arab Hospital", city: "رام الله", type: "Private", coordinates: [31.933553067680933, 35.16231420361561] },
        ];

        // عرض المستشفيات والمراكز الصحية باستخدام الرموز التعبيرية
        facilities.forEach(facility => {
            var color = facility.type === "Public" ? "green" : "blue";
            var emoji = facility.type === "health_center" ? "🩺" : "🏥";
            var marker = L.divIcon({
                className: '',
                html: `<div style="font-size: 24px; text-align: center; color:${color};">${emoji}</div>`,
                iconSize: [30, 30],
                iconAnchor: [15, 15]
            });

            L.marker(facility.coordinates, { icon: marker })
                .bindPopup(`<b>${facility.name_ar}</b><br>${facility.name_en}<br>المدينة: ${facility.city}<br>التصنيف: ${facility.type === "Public" ? "عام" : "خاص"}`)
                .addTo(map);
        });

        // إضافة مفتاح الخريطة (Legend)
        var legend = L.control({ position: 'bottomright' });
        legend.onAdd = function () {
            var div = L.DomUtil.create('div', 'legend');
            div.innerHTML += '<span style="color: green;">🏥</span> مستشفى عام<br>';
            div.innerHTML += '<span style="color: blue;">🏥</span> مستشفى خاص<br>';
            div.innerHTML += '<span style="color: red;">🩺</span> مركز صحي<br>';
            div.innerHTML += '<i style="background: cyan; border: 1px solid blue; display: inline-block; width: 20px; height: 20px;"></i> محافظة رام الله';
            return div;
        };
        legend.addTo(map);
    </script>
</body>
</html>
