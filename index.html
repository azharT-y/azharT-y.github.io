<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>خريطة المستشفيات ومحافظة رام الله</title>
    <!-- مكتبة Leaflet -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; }
        #map { width: 100%; height: 100vh; }
        .legend { background: white; padding: 10px; line-height: 1.5em; border-radius: 5px; box-shadow: 0 0 10px rgba(0,0,0,0.5); }
        .legend i { width: 20px; height: 20px; float: right; margin-left: 8px; opacity: 0.9; background-size: cover; }
    </style>
</head>
<body>
    <div id="map"></div>
    <script>
        // إعداد الخريطة
        var map = L.map('map').setView([31.9, 35.2], 12);

        // طبقة OpenStreetMap
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; OpenStreetMap contributors'
        }).addTo(map);

        // أيقونات مخصصة
        var hospitalIcon = L.icon({
            iconUrl: 'https://cdn-icons-png.flaticon.com/512/3456/3456552.png',
            iconSize: [25, 25],
            iconAnchor: [12, 25],
            popupAnchor: [0, -20]
        });

        var clinicIcon = L.icon({
            iconUrl: 'https://cdn-icons-png.flaticon.com/512/854/854878.png',
            iconSize: [25, 25],
            iconAnchor: [12, 25],
            popupAnchor: [0, -20]
        });

        var emergencyIcon = L.icon({
            iconUrl: 'https://cdn-icons-png.flaticon.com/512/1048/1048354.png',
            iconSize: [25, 25],
            iconAnchor: [12, 25],
            popupAnchor: [0, -20]
        });

        // بيانات المستشفيات والمراكز الطبية (16 موقع)
        var facilities = [
            { "name": "مجمع فلسطين الطبي", "coords": [31.8988, 35.2048], "type": "hospital" },
            { "name": "مستشفى الرعاية التخصصي", "coords": [31.9053, 35.2050], "type": "hospital" },
            { "name": "مركز الطوارئ بيتونيا", "coords": [31.8995, 35.1920], "type": "emergency" },
            { "name": "مركز كلينكير الطبي", "coords": [31.9040, 35.2001], "type": "clinic" },
            { "name": "مستشفى خالد الحرامي", "coords": [31.9005, 35.2033], "type": "hospital" },
            { "name": "مستشفى المستقبل", "coords": [31.9060, 35.2090], "type": "hospital" },
            { "name": "مستشفى أبويا", "coords": [31.9015, 35.2075], "type": "clinic" },
            { "name": "مركز الأمل الطبي", "coords": [31.9020, 35.2025], "type": "clinic" },
            { "name": "مركز هيلث هاوس", "coords": [31.9032, 35.1985], "type": "clinic" },
            { "name": "مستشفى الهلال الأحمر", "coords": [31.9080, 35.2085], "type": "hospital" },
            { "name": "المستشفى الاستشاري", "coords": [31.9100, 35.2150], "type": "hospital" },
            { "name": "مستشفى د. ضرغام", "coords": [31.8950, 35.2101], "type": "hospital" },
            { "name": "مركز الراجحي الطبي", "coords": [31.9075, 35.2130], "type": "clinic" },
            { "name": "مستشفى الطوارئ", "coords": [31.8993, 35.2028], "type": "emergency" }
        ];

        facilities.forEach(function(facility) {
            var icon = facility.type === "hospital" ? hospitalIcon : 
                       facility.type === "clinic" ? clinicIcon : emergencyIcon;

            L.marker(facility.coords, { icon: icon })
             .bindPopup(`<b>${facility.name}</b>`)
             .addTo(map);
        });

        // مضلع محافظة رام الله
        var ramallahPolygon = {
            "type": "Feature",
            "geometry": {
                "type": "Polygon",
                "coordinates": [
                    [[35.190, 31.890], [35.220, 31.890], [35.220, 31.920], [35.190, 31.920], [35.190, 31.890]]
                ]
            }
        };

        L.geoJSON(ramallahPolygon, {
            style: { color: "blue", weight: 2, fillColor: "cyan", fillOpacity: 0.3 }
        }).bindPopup("محافظة رام الله").addTo(map);
    </script>
</body>
</html>
