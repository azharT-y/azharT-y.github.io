<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>خريطة المستشفيات والمراكز الصحية</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; }
        #map { width: 100%; height: 100vh; }
        .legend {
            background: white;
            padding: 10px;
            border-radius: 5px;
            box-shadow: 0 0 10px rgba(0,0,0,0.5);
            font-size: 14px;
            line-height: 1.8em;
        }
        .legend i {
            width: 20px;
            height: 20px;
            display: inline-block;
            margin-right: 8px;
            background-size: cover;
        }
    </style>
</head>
<body>
    <div id="map"></div>

    <script>
        // إعداد الخريطة
        var map = L.map('map').setView([31.9, 35.2], 12);

        // إضافة طبقة OpenStreetMap
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; OpenStreetMap contributors'
        }).addTo(map);

        // أيقونة المستشفيات
        var hospitalIcon = L.icon({
            iconUrl: 'https://i.imgur.com/eLczvma.png', // صورة الأيقونة الجديدة (ارفع الصورة هنا)
            iconSize: [40, 40], // حجم الأيقونة
            iconAnchor: [20, 40],
            popupAnchor: [0, -40]
        });

        // تحميل مضلع خريطة رام الله
        fetch('RamallahZones.json')
            .then(response => response.json())
            .then(data => {
                L.geoJSON(data, {
                    style: { color: "blue", weight: 2, fillColor: "cyan", fillOpacity: 0.3 }
                }).bindPopup("محافظة رام الله").addTo(map);
            })
            .catch(error => console.error("خطأ في تحميل ملف RamallahZones.json:", error));

        // جدول المستشفيات
        var hospitalData = [
            { name: "مجمع فلسطين الطبي", coordinates: [35.2124, 31.9063] },
            { name: "مستشفى الرعاية التخصصي", coordinates: [35.2094, 31.9044] },
            { name: "مستشفى د. درغام", coordinates: [35.2064, 31.9084] },
            { name: "مستشفى المستقبل", coordinates: [35.2214, 31.9124] },
            { name: "المركز الصحي العربي", coordinates: [35.2264, 31.9124] },
            { name: "مستشفى الهلال الأحمر", coordinates: [35.2134, 31.9014] },
            { name: "مستشفى الناصر للولادة", coordinates: [35.2144, 31.9044] },
            { name: "مستشفى الرازي", coordinates: [35.2174, 31.9034] },
            { name: "مستشفى مسلم التخصصي", coordinates: [35.2164, 31.9024] },
            { name: "مركز الراجحي الطبي", coordinates: [35.2184, 31.9014] },
            { name: "مستشفى الهلال الأحمر", coordinates: [35.2194, 31.9034] },
            { name: "مستشفى خالد", coordinates: [35.2214, 31.9024] },
            { name: "مستشفى أبو ريّا للتأهيل", coordinates: [35.2204, 31.9054] }
        ];

        // عرض المستشفيات على الخريطة
        hospitalData.forEach(hospital => {
            L.marker(hospital.coordinates, { icon: hospitalIcon })
                .bindPopup(`<b>${hospital.name}</b>`)
                .addTo(map);
        });

        // إضافة مفتاح الخريطة (Legend)
        var legend = L.control({ position: 'bottomright' });
        legend.onAdd = function (map) {
            var div = L.DomUtil.create('div', 'legend');
            div.innerHTML += '<i style="background-image: url(https://i.imgur.com/eLczvma.png);"></i> مستشفى<br>';
            div.innerHTML += '<i style="background: cyan; border: 1px solid blue; display: inline-block; width: 20px; height: 20px;"></i> محافظة رام الله';
            return div;
        };
        legend.addTo(map);
    </script>
</body>
</html>
