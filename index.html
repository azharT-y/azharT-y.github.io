<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hospitals and Health Centers Map</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; }
        #map { width: 100%; height: 100vh; }
        .legend {
            position: absolute;
            bottom: 10px;
            right: 10px;
            background: white;
            padding: 10px;
            border-radius: 5px;
            box-shadow: 0 0 10px rgba(0,0,0,0.5);
            font-size: 14px;
            line-height: 1.8em;
            z-index: 1000;
        }
        .search-container {
            position: absolute;
            top: 10px;
            left: 10px;
            z-index: 1000;
            background: white;
            padding: 10px;
            border-radius: 5px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.5);
        }
        .filter-btn {
            position: absolute;
            top: 60px;
            left: 10px;
            z-index: 1000;
            background: white;
            padding: 10px;
            border-radius: 5px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.5);
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div id="map"></div>
    <div class="search-container">
        <input type="text" id="search-input" placeholder="Search for a hospital or health center" style="width: 200px; padding: 5px; border: 1px solid #ccc; border-radius: 5px;" />
    </div>
    <div class="filter-btn" id="filter-btn">Classify Hospitals</div>

    <script>
        var map = L.map('map').setView([31.9, 35.2], 12);

        // Add OpenStreetMap layer
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; OpenStreetMap contributors'
        }).addTo(map);

        // Load Ramallah polygon
        fetch('RamallahZones.json')
            .then(response => response.json())
            .then(data => {
                L.geoJSON(data, {
                    style: { color: "blue", weight: 2, fillColor: "cyan", fillOpacity: 0.3 }
                }).bindPopup("Ramallah District").addTo(map);
            })
            .catch(error => console.error("Error loading RamallahZones.json:", error));

        var allFacilities = [];

        // Load hospitals and health centers
        fetch('Hospitals.geojson')
            .then(response => response.json())
            .then(data => {
                L.geoJSON(data, {
                    pointToLayer: function (feature, latlng) {
                        // Extract properties and check for missing values
                        var name = feature.properties.name || "No name provided";
                        var type = feature.properties.type || "Type not specified";
                        var category = feature.properties.category || "Category not specified";
                        var emoji = category === "hospital" ? "🏥" : "🩺";
                        var color = type === "Public" ? "green" : "blue";

                        // Create the marker with the appropriate icon
                        var iconHtml = `<span style="color:${color}; font-size: 24px;">${emoji}</span>`;
                        var marker = L.divIcon({
                            className: '',
                            html: `<div style="text-align: center;">${iconHtml}</div>`,
                            iconSize: [30, 30],
                            iconAnchor: [15, 15]
                        });

                        var facilityMarker = L.marker(latlng, { icon: marker })
                            .bindPopup(`<b>${name}</b><br>Type: ${type}<br>Category: ${category}`)
                            .addTo(map);

                        allFacilities.push({
                            name: name,
                            type: type,
                            category: category,
                            latlng: latlng,
                            marker: facilityMarker
                        });

                        return facilityMarker;
                    }
                });
            })
            .catch(error => console.error("Error loading Hospitals.geojson:", error));

        // Legend
        var legend = L.control({ position: 'bottomright' });
        legend.onAdd = function () {
            var div = L.DomUtil.create('div', 'legend');
            div.innerHTML += '<span style="color: green;">🏥</span> Public Hospital<br>';
            div.innerHTML += '<span style="color: blue;">🏥</span> Private Hospital<br>';
            div.innerHTML += '<span>🩺</span> Health Center<br>';
            div.innerHTML += '<i style="background: cyan; border: 1px solid blue; display: inline-block; width: 20px; height: 20px;"></i> Ramallah District';
            return div;
        };
        legend.addTo(map);
    </script>
</body>
</html>
