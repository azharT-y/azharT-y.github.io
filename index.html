<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>خريطة المستشفيات ومحافظة رام الله</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet-search@3.0.0/dist/leaflet-search.min.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet-search@3.0.0/dist/leaflet-search.min.js"></script>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; }
        #map { width: 100%; height: 100vh; }
        .legend {
            background: white;
            padding: 10px;
            border-radius: 5px;
            box-shadow: 0 0 10px rgba(0,0,0,0.5);
            line-height: 1.8em;
        }
        .legend i {
            width: 20px;
            height: 20px;
            display: inline-block;
            margin-right: 8px;
            background-size: cover;
        }
    </style>
</head>
<body>
    <div id="map"></div>

    <script>
        var map = L.map('map').setView([31.9, 35.2], 13);

        // طبقة OpenStreetMap
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; OpenStreetMap contributors'
        }).addTo(map);

        // أيقونة المستشفيات بحجم أكبر
        var hospitalIcon = L.icon({
            iconUrl: 'https://cdn-icons-png.flaticon.com/512/2329/2329149.png',
            iconSize: [50, 50], // تكبير حجم الأيقونة
            iconAnchor: [25, 50], // ضبط نقطة التثبيت للأيقونة
            popupAnchor: [0, -50] // ضبط موضع النافذة المنبثقة
        });

        // تحميل مضلع محافظة رام الله
        fetch('RamallahZones.json')
            .then(response => response.json())
            .then(data => {
                var ramallahLayer = L.geoJSON(data, {
                    style: { color: "blue", weight: 2, fillColor: "transparent", fillOpacity: 0 }
                }).bindPopup("محافظة رام الله").addTo(map);

                // ملاءمة الخريطة لتناسب حدود المحافظة
                map.fitBounds(ramallahLayer.getBounds());
            })
            .catch(error => console.error("خطأ في تحميل ملف RamallahZones.json:", error));

        // تحميل المستشفيات والتأكد من ظهورها داخل الخريطة
        var hospitalsLayer = L.layerGroup();
        fetch('Hospitals.geojson')
            .then(response => response.json())
            .then(data => {
                var hospitals = L.geoJSON(data, {
                    pointToLayer: function (feature, latlng) {
                        return L.marker(latlng, { icon: hospitalIcon })
                            .bindPopup(`<b>${feature.properties.name || "مستشفى غير معروف"}</b>`);
                    }
                });

                // إضافة المستشفيات إلى الخريطة
                hospitalsLayer.addLayer(hospitals);
                map.addLayer(hospitalsLayer);

                // التأكد من ظهور المستشفيات ضمن العرض
                var hospitalsBounds = hospitals.getBounds();
                map.fitBounds(hospitalsBounds);

                // إضافة أداة البحث
                var searchControl = new L.Control.Search({
                    layer: hospitalsLayer,
                    propertyName: 'name',
                    marker: false,
                    moveToLocation: function (latlng, title, map) {
                        map.setView(latlng, 16); // تكبير عند العثور على الموقع
                    }
                });
                searchControl.addTo(map);
            })
            .catch(error => console.error("خطأ في تحميل ملف المستشفيات:", error));

        // إضافة مفتاح الخريطة
        var legend = L.control({ position: 'bottomleft' });
        legend.onAdd = function () {
            var div = L.DomUtil.create('div', 'legend');
            div.innerHTML += '<i style="background-image: url(https://cdn-icons-png.flaticon.com/512/2329/2329149.png); width: 20px; height: 20px;"></i> مستشفى<br>';
            div.innerHTML += '<i style="background: transparent; border: 1px solid blue;"></i> محافظة رام الله';
            return div;
        };
        legend.addTo(map);
    </script>
</body>
</html>

map.fitBounds(hospitalsBounds);
