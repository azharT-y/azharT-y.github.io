<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>خريطة المستشفيات والمراكز الصحية</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; }
        #map { width: 100%; height: 100vh; }
        .legend {
            background: white;
            padding: 10px;
            border-radius: 5px;
            box-shadow: 0 0 10px rgba(0,0,0,0.5);
            font-size: 14px;
            line-height: 1.8em;
        }
        .legend i {
            width: 20px;
            height: 20px;
            display: inline-block;
            margin-right: 8px;
            background-size: cover;
        }
    </style>
</head>
<body>
    <div id="map"></div>

    <script>
        // إعداد الخريطة
        var map = L.map('map').setView([31.9, 35.2], 12);

        // إضافة طبقة OpenStreetMap
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; OpenStreetMap contributors'
        }).addTo(map);

        // أيقونة المستشفيات الجديدة (الشكل الأحمر)
        var hospitalIcon = L.icon({
            iconUrl: 'YOUR_ICON_URL_HERE', // استبدل بـ رابط الصورة المرفقة
            iconSize: [40, 40], // تكبير الأيقونة
            iconAnchor: [20, 40],
            popupAnchor: [0, -40]
        });

        // تحميل مضلع خريطة رام الله
        fetch('RamallahZones.json')
            .then(response => response.json())
            .then(data => {
                L.geoJSON(data, {
                    style: { color: "blue", weight: 2, fillColor: "cyan", fillOpacity: 0.3 }
                }).bindPopup("محافظة رام الله").addTo(map);
            })
            .catch(error => console.error("خطأ في تحميل ملف RamallahZones.json:", error));

        // تحميل المستشفيات وإظهارها على الخريطة
        fetch('Hospitals.geojson')
            .then(response => response.json())
            .then(data => {
                var hospitalsLayer = L.geoJSON(data, {
                    pointToLayer: function (feature, latlng) {
                        // إضافة الأيقونة الجديدة
                        return L.marker(latlng, { icon: hospitalIcon })
                            .bindPopup(`<b>${feature.properties.name || "اسم غير متوفر"}</b>`); // عرض اسم المستشفى
                    }
                }).addTo(map);

                // ضبط الخريطة لتشمل جميع النقاط
                map.fitBounds(hospitalsLayer.getBounds());
            })
            .catch(error => console.error("خطأ في تحميل ملف Hospitals.geojson:", error));
    </script>
</body>
</html>
