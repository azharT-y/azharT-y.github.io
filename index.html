<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>خريطة المستشفيات والمراكز الصحية</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; }
        #map { width: 100%; height: 100vh; }
        .search-container {
            position: absolute;
            top: 10px;
            left: 10px;
            background: white;
            padding: 10px;
            border-radius: 5px;
            box-shadow: 0 0 10px rgba(0,0,0,0.5);
            z-index: 1000;
        }
        .legend {
            background: white;
            padding: 10px;
            border-radius: 5px;
            box-shadow: 0 0 10px rgba(0,0,0,0.5);
            font-size: 14px;
            line-height: 1.8em;
            position: absolute;
            bottom: 10px;
            right: 10px;
            z-index: 1000;
        }
        .legend span {
            display: inline-block;
            width: 20px;
            height: 20px;
            text-align: center;
            line-height: 20px;
            font-size: 18px;
        }
    </style>
</head>
<body>
    <div id="map"></div>
    <div class="search-container">
        <input type="text" id="search-input" placeholder="ابحث عن مستشفى أو مركز صحي" style="width: 200px; padding: 5px; border: 1px solid #ccc; border-radius: 5px;" />
        <ul id="search-results" style="list-style: none; padding: 0; margin: 0;"></ul>
    </div>

    <script>
        // إعداد الخريطة
        var map = L.map('map').setView([31.9, 35.2], 12);

        // إضافة طبقة OpenStreetMap
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; OpenStreetMap contributors'
        }).addTo(map);

        // تحميل مضلع محافظة رام الله
        fetch('RamallahZones.json')
            .then(response => response.json())
            .then(data => {
                L.geoJSON(data, {
                    style: { color: "blue", weight: 2, fillColor: "cyan", fillOpacity: 0.3 }
                }).bindPopup("محافظة رام الله").addTo(map);
            })
            .catch(error => console.error("خطأ في تحميل ملف RamallahZones.json:", error));

        // بيانات المستشفيات والمراكز الصحية
        var facilities = [
            { name: "مجمع فلسطين الطبي", coordinates: [31.9063, 35.2124], type: "hospital", category: "Public" },
            { name: "مستشفى الرعاية التخصصي", coordinates: [31.9044, 35.2094], type: "hospital", category: "Private" },
            { name: "مستشفى د. درغام", coordinates: [31.9084, 35.2064], type: "hospital", category: "Private" },
            { name: "مستشفى المستقبل", coordinates: [31.9124, 35.2214], type: "hospital", category: "Public" },
            { name: "المركز الصحي العربي", coordinates: [31.9124, 35.2264], type: "health_center", category: "Public" },
            { name: "مستشفى الهلال الأحمر", coordinates: [31.9014, 35.2134], type: "hospital", category: "Public" },
            { name: "مستشفى الناصر للولادة", coordinates: [31.9044, 35.2144], type: "hospital", category: "Private" },
            { name: "مستشفى الرازي", coordinates: [31.9034, 35.2174], type: "hospital", category: "Private" },
            { name: "مستشفى مسلم التخصصي", coordinates: [31.9024, 35.2164], type: "hospital", category: "Private" },
            { name: "مركز الراجحي الطبي", coordinates: [31.9014, 35.2184], type: "health_center", category: "Private" },
            { name: "مستشفى خالد", coordinates: [31.9024, 35.2214], type: "hospital", category: "Public" },
            { name: "مستشفى أبو ريّا للتأهيل", coordinates: [31.9054, 35.2204], type: "hospital", category: "Public" }
        ];

        // عرض المستشفيات والمراكز الصحية باستخدام الرموز التعبيرية
        var markers = [];
        facilities.forEach(facility => {
            var color = facility.category === "Public" ? "green" : (facility.type === "health_center" ? "red" : "blue");
            var emoji = facility.type === "hospital" ? "🏥" : "🩺";
            var marker = L.divIcon({
                className: '',
                html: `<div style="font-size: 24px; text-align: center; color:${color};">${emoji}</div>`,
                iconSize: [30, 30],
                iconAnchor: [15, 15]
            });

            var facilityMarker = L.marker(facility.coordinates, { icon: marker })
                .bindPopup(`<b>${facility.name}</b><br>نوع: ${facility.type === "hospital" ? "مستشفى" : "مركز صحي"}<br>التصنيف: ${facility.category === "Public" ? "عام" : "خاص"}`)
                .addTo(map);

            markers.push({ name: facility.name, marker: facilityMarker });
        });

        // أداة البحث
        const searchInput = document.getElementById("search-input");
        searchInput.addEventListener("input", function () {
            const query = searchInput.value.toLowerCase();
            markers.forEach(facility => {
                if (facility.name.toLowerCase().includes(query)) {
                    facility.marker.openPopup();
                    map.setView(facility.marker.getLatLng(), 15);
                }
            });
        });

        // إضافة مفتاح الخريطة (Legend)
        var legend = L.control({ position: 'bottomright' });
        legend.onAdd = function () {
            var div = L.DomUtil.create('div', 'legend');
            div.innerHTML += '<span style="color: green;">🏥</span> مستشفى عام<br>';
            div.innerHTML += '<span style="color: blue;">🏥</span> مستشفى خاص<br>';
            div.innerHTML += '<span style="color: red;">🩺</span> مركز صحي<br>';
            div.innerHTML += '<i style="background: cyan; border: 1px solid blue; display: inline-block; width: 20px; height: 20px;"></i> محافظة رام الله';
            return div;
        };
        legend.addTo(map);
    </script>
</body>
</html>
