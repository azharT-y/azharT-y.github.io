<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>خريطة المستشفيات والمراكز الصحية</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; }
        #map { width: 100%; height: 100vh; }
    </style>
</head>
<body>
    <div id="map"></div>

    <script>
        // إنشاء الخريطة
        var map = L.map('map').setView([31.9, 35.2], 12);

        // إضافة طبقة OpenStreetMap
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; OpenStreetMap contributors'
        }).addTo(map);

        // تعريف الأيقونات
        var hospitalIcon = L.icon({
            iconUrl: 'https://cdn-icons-png.flaticon.com/512/2329/2329149.png', // أيقونة المستشفى (حمراء)
            iconSize: [40, 40], // حجم الأيقونة
            iconAnchor: [20, 40], // نقطة التثبيت
            popupAnchor: [0, -40] // موضع النافذة المنبثقة
        });

        var healthCenterIcon = L.icon({
            iconUrl: 'https://cdn-icons-png.flaticon.com/512/3649/3649463.png', // أيقونة المركز الصحي (صفراء)
            iconSize: [40, 40], // حجم الأيقونة
            iconAnchor: [20, 40], // نقطة التثبيت
            popupAnchor: [0, -40] // موضع النافذة المنبثقة
        });

        // تحميل المستشفيات والمراكز الصحية
        fetch('Hospitals.geojson') // تأكد من أن ملف Hospitals.geojson موجود في نفس المسار
            .then(response => response.json())
            .then(data => {
                // إضافة النقاط إلى الخريطة
                var hospitalsLayer = L.geoJSON(data, {
                    pointToLayer: function (feature, latlng) {
                        // تحديد الأيقونة بناءً على النوع (hospital أو health_center)
                        var icon = feature.properties.type === 'hospital' ? hospitalIcon : healthCenterIcon;

                        // إضافة العلامة إلى الخريطة مع النافذة المنبثقة
                        return L.marker(latlng, { icon: icon })
                            .bindPopup(`<b>${feature.properties.name || "اسم غير متوفر"}</b>`);
                    }
                });

                // إضافة الطبقة إلى الخريطة
                hospitalsLayer.addTo(map);

                // ضبط عرض الخريطة لتشمل جميع النقاط
                map.fitBounds(hospitalsLayer.getBounds());
            })
            .catch(error => console.error("خطأ في تحميل ملف Hospitals.geojson:", error));
    </script>
</body>
</html>
