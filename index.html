<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>خريطة المستشفيات ومحافظة رام الله</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; }
        #map { width: 100%; height: 100vh; }
    </style>
</head>
<body>
    <div id="map"></div>

    <script>
        var map = L.map('map').setView([31.9, 35.2], 12);

        // طبقة OpenStreetMap
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; OpenStreetMap contributors'
        }).addTo(map);

        // أيقونة المستشفيات بحجم أكبر
        var hospitalIcon = L.icon({
            iconUrl: 'https://cdn-icons-png.flaticon.com/512/2329/2329149.png',
            iconSize: [50, 50],
            iconAnchor: [25, 50],
            popupAnchor: [0, -50]
        });

        // تحميل مضلع محافظة رام الله
        fetch('RamallahZones.json')
            .then(response => response.json())
            .then(data => {
                var ramallahLayer = L.geoJSON(data, {
                    style: { color: "blue", weight: 2, fillOpacity: 0 }
                }).bindPopup("محافظة رام الله").addTo(map);

                // ملاءمة الخريطة لحدود محافظة رام الله
                map.fitBounds(ramallahLayer.getBounds());
            })
            .catch(error => console.error("خطأ في تحميل ملف RamallahZones.json:", error));

        // تحميل المستشفيات
        fetch('Hospitals.geojson')
            .then(response => response.json())
            .then(data => {
                var hospitalsLayer = L.geoJSON(data, {
                    pointToLayer: function (feature, latlng) {
                        return L.marker(latlng, { icon: hospitalIcon })
                            .bindPopup(`<b>${feature.properties.name || "مستشفى غير معروف"}</b>`);
                    }
                }).addTo(map);

                // ضبط حدود الخريطة لتشمل جميع المستشفيات
                map.fitBounds(hospitalsLayer.getBounds());
            })
            .catch(error => console.error("خطأ في تحميل ملف Hospitals.geojson:", error));
    </script>
</body>
</html>
map.fitBounds(hospitalsLayer.getBounds());
var hospitalIcon = L.icon({
    iconUrl: 'https://cdn-icons-png.flaticon.com/512/2329/2329149.png',
    iconSize: [50, 50],
    iconAnchor: [25, 50],
    popupAnchor: [0, -50]
});
