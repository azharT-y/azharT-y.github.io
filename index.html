<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>خريطة المستشفيات والمراكز الصحية</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; }
        #map { width: 100%; height: 100vh; }
        .legend {
            background: white;
            padding: 10px;
            border-radius: 5px;
            box-shadow: 0 0 10px rgba(0,0,0,0.5);
            line-height: 1.8em;
            font-size: 14px;
        }
        .legend i {
            width: 20px;
            height: 20px;
            float: left;
            margin-right: 8px;
            opacity: 0.7;
        }
    </style>
</head>
<body>
    <div id="map"></div>

    <script>
        // إعداد الخريطة
        var map = L.map('map').setView([31.9, 35.2], 12);

        // طبقة OpenStreetMap
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; OpenStreetMap contributors'
        }).addTo(map);

        // أيقونات المستشفيات والمراكز الصحية
        var hospitalIcon = L.icon({
            iconUrl: 'https://cdn-icons-png.flaticon.com/512/2329/2329149.png', // أيقونة المستشفى
            iconSize: [40, 40],
            iconAnchor: [20, 40],
            popupAnchor: [0, -40]
        });

        var healthCenterIcon = L.icon({
            iconUrl: 'https://cdn-icons-png.flaticon.com/512/3649/3649463.png', // أيقونة المركز الصحي
            iconSize: [40, 40],
            iconAnchor: [20, 40],
            popupAnchor: [0, -40]
        });

        // تحميل مضلع محافظة رام الله
        fetch('RamallahZones.json') // تأكد من وجود الملف في نفس المجلد
            .then(response => response.json())
            .then(data => {
                L.geoJSON(data, {
                    style: { color: "blue", weight: 2, fillColor: "cyan", fillOpacity: 0.3 }
                }).bindPopup("محافظة رام الله").addTo(map);
            })
            .catch(error => console.error("خطأ في تحميل ملف RamallahZones.json:", error));

        // تحميل المستشفيات والمراكز الصحية
        fetch('Hospitals.geojson') // تأكد من وجود الملف في نفس المجلد
            .then(response => response.json())
            .then(data => {
                var hospitalsLayer = L.geoJSON(data, {
                    pointToLayer: function (feature, latlng) {
                        // اختر الأيقونة بناءً على النوع
                        var icon = feature.properties.type === 'hospital' ? hospitalIcon : healthCenterIcon;
                        return L.marker(latlng, { icon: icon })
                            .bindPopup(`<b>${feature.properties.name || "اسم غير متوفر"}</b>`); // عرض اسم المستشفى أو المركز الصحي
                    }
                }).addTo(map);

                // ضبط حدود الخريطة لتناسب المواقع
                map.fitBounds(hospitalsLayer.getBounds());
            })
            .catch(error => console.error("خطأ في تحميل ملف Hospitals.geojson:", error));

        // إضافة مفتاح الخريطة (Legend)
        var legend = L.control({ position: 'bottomright' });
        legend.onAdd = function (map) {
            var div = L.DomUtil.create('div', 'legend');
            div.innerHTML += '<i style="background: url(https://cdn-icons-png.flaticon.com/512/2329/2329149.png); background-size: contain;"></i> مستشفى<br>';
            div.innerHTML += '<i style="background: url(https://cdn-icons-png.flaticon.com/512/3649/3649463.png); background-size: contain;"></i> مركز صحي<br>';
            div.innerHTML += '<i style="background: cyan; width: 20px; height: 20px; display: inline-block; margin-right: 8px;"></i> محافظة رام الله';
            return div;
        };
        legend.addTo(map);
    </script>
</body>
</html>
