<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>خريطة المستشفيات ومحافظة رام الله</title>
    <!-- مكتبة Leaflet -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <!-- مكتبة Leaflet Search -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet-search/2.9.8/leaflet-search.min.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet-search/2.9.8/leaflet-search.min.js"></script>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; }
        #map { width: 100%; height: 100vh; }
        .legend { background: white; padding: 10px; line-height: 1.5em; border-radius: 5px; box-shadow: 0 0 10px rgba(0,0,0,0.5); }
        .legend i { width: 20px; height: 20px; float: right; margin-left: 8px; opacity: 0.9; background-size: cover; }
    </style>
</head>
<body>
    <div id="map"></div>

    <script>
        // إعداد الخريطة
        var map = L.map('map').setView([31.9, 35.2], 12);

        // إضافة خريطة OpenStreetMap
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; OpenStreetMap contributors'
        }).addTo(map);

        // أيقونات مخصصة
        var hospitalIcon = L.icon({
            iconUrl: 'https://cdn-icons-png.flaticon.com/512/3456/3456552.png',
            iconSize: [30, 30],
            iconAnchor: [15, 30],
            popupAnchor: [0, -30]
        });

        var emergencyIcon = L.icon({
            iconUrl: 'https://cdn-icons-png.flaticon.com/512/1048/1048354.png',
            iconSize: [30, 30],
            iconAnchor: [15, 30],
            popupAnchor: [0, -30]
        });

        var clinicIcon = L.icon({
            iconUrl: 'https://cdn-icons-png.flaticon.com/512/854/854878.png',
            iconSize: [30, 30],
            iconAnchor: [15, 30],
            popupAnchor: [0, -30]
        });

        // بيانات المستشفيات والمراكز الطبية
        var facilities = [
            { "name": "مجمع فلسطين الطبي", "coords": [31.8988, 35.2048], "type": "hospital" },
            { "name": "مستشفى الرعاية التخصصي", "coords": [31.9053, 35.2050], "type": "hospital" },
            { "name": "مركز الطوارئ بيتونيا", "coords": [31.8995, 35.1920], "type": "emergency" },
            { "name": "مركز كلينكير الطبي", "coords": [31.9040, 35.2001], "type": "clinic" },
            { "name": "مستشفى خالد الحرامي", "coords": [31.9005, 35.2033], "type": "hospital" },
            { "name": "مركز الأمل الطبي", "coords": [31.9020, 35.2025], "type": "clinic" },
            { "name": "مستشفى الطوارئ بيتونيا", "coords": [31.8993, 35.2028], "type": "emergency" }
        ];

        // إضافة المستشفيات إلى الخريطة
        facilities.forEach(function(facility) {
            var icon = facility.type === "hospital" ? hospitalIcon : 
                       facility.type === "emergency" ? emergencyIcon : clinicIcon;

            L.marker(facility.coords, { icon: icon })
             .bindPopup(`<b>${facility.name}</b>`)
             .addTo(map);
        });

        // مضلع محافظة رام الله (بيانات تجريبية)
        var ramallahPolygon = {
            "type": "Feature",
            "geometry": {
                "type": "Polygon",
                "coordinates": [
                    [
                        [35.190, 31.900],
                        [35.215, 31.900],
                        [35.215, 31.920],
                        [35.190, 31.920],
                        [35.190, 31.900]
                    ]
                ]
            }
        };

        // إضافة مضلع محافظة رام الله
        L.geoJSON(ramallahPolygon, {
            style: { color: "blue", weight: 2, fillColor: "cyan", fillOpacity: 0.4 }
        }).bindPopup("<b>محافظة رام الله</b>").addTo(map);

        // أداة البحث
        var searchControl = new L.Control.Search({
            layer: L.layerGroup(facilities.map(function(facility) {
                return L.marker(facility.coords);
            })),
            propertyName: 'name',
            marker: false,
            moveToLocation: function(latlng, title, map) {
                map.setView(latlng, 15);
            }
        });
        map.addControl(searchControl);

        // إضافة ليجند (مفتاح الخريطة)
        var legend = L.control({ position: 'bottomleft' });
        legend.onAdd = function () {
            var div = L.DomUtil.create('div', 'legend');
            div.innerHTML += '<i style="background-image: url(https://cdn-icons-png.flaticon.com/512/3456/3456552.png);"></i> مستشفى<br>';
            div.innerHTML += '<i style="background-image: url(https://cdn-icons-png.flaticon.com/512/1048/1048354.png);"></i> مركز طوارئ<br>';
            div.innerHTML += '<i style="background-image: url(https://cdn-icons-png.flaticon.com/512/854/854878.png);"></i> مركز طبي<br>';
            div.innerHTML += '<i style="background: cyan;"></i> محافظة رام الله<br>';
            return div;
        };
        legend.addTo(map);
    </script>
</body>
</html>
