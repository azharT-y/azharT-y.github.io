<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>خريطة محافظة رام الله</title>
    <!-- مكتبة Leaflet -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; }
        #map { width: 100%; height: 100vh; }
    </style>
</head>
<body>
    <div id="map"></div>
    <script>
        // إعداد الخريطة
        var map = L.map('map').setView([31.9, 35.2], 12);

        // طبقة خريطة OpenStreetMap
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; OpenStreetMap contributors'
        }).addTo(map);

        // مضلع محافظة رام الله
        var ramallahPolygon = {
            "type": "Feature",
            "geometry": {
                "type": "Polygon",
                "coordinates": [
                    [[35.190, 31.890], [35.220, 31.890], [35.220, 31.920], [35.190, 31.920], [35.190, 31.890]]
                ]
            }
        };

        // عرض المضلع
        L.geoJSON(ramallahPolygon, {
            style: { color: "blue", weight: 2, fillOpacity: 0.3 }
        }).addTo(map);

        // بيانات المستشفيات (مواقع وهمية)
        var hospitals = [
            { name: "مجمع فلسطين الطبي", coords: [31.8988, 35.2048] },
            { name: "مستشفى الرعاية التخصصي", coords: [31.9053, 35.2050] },
            { name: "مركز الطوارئ", coords: [31.9010, 35.2020] }
        ];

        // أيقونة المستشفى
        var hospitalIcon = L.icon({
            iconUrl: 'https://cdn-icons-png.flaticon.com/512/3456/3456552.png',
            iconSize: [25, 25],
            iconAnchor: [12, 25],
            popupAnchor: [0, -20]
        });

        // إضافة المستشفيات للخريطة
        hospitals.forEach(function(hospital) {
            L.marker(hospital.coords, { icon: hospitalIcon })
                .bindPopup(`<b>${hospital.name}</b>`)
                .addTo(map);
        });
    </script>
</body>
</html>
