<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>خريطة المستشفيات والمراكز الصحية</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; }
        #map { width: 100%; height: 100vh; }
        .legend {
            background: white;
            padding: 10px;
            border-radius: 5px;
            box-shadow: 0 0 10px rgba(0,0,0,0.5);
            font-size: 14px;
            line-height: 1.8em;
        }
        .legend span {
            display: inline-block;
            width: 20px;
            height: 20px;
            text-align: center;
            line-height: 20px;
            font-size: 18px;
        }
    </style>
</head>
<body>
    <div id="map"></div>

    <script>
        // إعداد الخريطة
        var map = L.map('map').setView([31.9, 35.2], 12);

        // إضافة طبقة OpenStreetMap
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; OpenStreetMap contributors'
        }).addTo(map);

        // بيانات المستشفيات والمراكز الصحية
        var facilities = [
            { name: "مجمع فلسطين الطبي", coordinates: [31.9063, 35.2124], type: "hospital" },
            { name: "مستشفى الرعاية التخصصي", coordinates: [31.9044, 35.2094], type: "hospital" },
            { name: "مستشفى د. درغام", coordinates: [31.9084, 35.2064], type: "hospital" },
            { name: "مستشفى المستقبل", coordinates: [31.9124, 35.2214], type: "hospital" },
            { name: "المركز الصحي العربي", coordinates: [31.9124, 35.2264], type: "health_center" },
            { name: "مستشفى الهلال الأحمر", coordinates: [31.9014, 35.2134], type: "hospital" },
            { name: "مستشفى الناصر للولادة", coordinates: [31.9044, 35.2144], type: "hospital" },
            { name: "مستشفى الرازي", coordinates: [31.9034, 35.2174], type: "hospital" },
            { name: "مستشفى مسلم التخصصي", coordinates: [31.9024, 35.2164], type: "hospital" },
            { name: "مركز الراجحي الطبي", coordinates: [31.9014, 35.2184], type: "health_center" },
            { name: "مستشفى خالد", coordinates: [31.9024, 35.2214], type: "hospital" },
            { name: "مستشفى أبو ريّا للتأهيل", coordinates: [31.9054, 35.2204], type: "hospital" }
        ];

        // عرض المستشفيات والمراكز الصحية باستخدام الرموز التعبيرية
        facilities.forEach(facility => {
            var emoji = facility.type === "hospital" ? "🏥" : "🩺";
            var marker = L.divIcon({
                className: '',
                html: `<div style="font-size: 24px; text-align: center;">${emoji}</div>`,
                iconSize: [30, 30],
                iconAnchor: [15, 15]
            });

            L.marker(facility.coordinates, { icon: marker })
                .bindPopup(`<b>${facility.name}</b>`)
                .addTo(map);
        });

        // إضافة مفتاح الخريطة (Legend)
        var legend = L.control({ position: 'bottomright' });
        legend.onAdd = function (map) {
            var div = L.DomUtil.create('div', 'legend');
            div.innerHTML += '<span>🏥</span> مستشفى<br>';
            div.innerHTML += '<span>🩺</span> مركز صحي<br>';
            div.innerHTML += '<i style="background: cyan; border: 1px solid blue; display: inline-block; width: 20px; height: 20px;"></i> محافظة رام الله';
            return div;
        };
        legend.addTo(map);
    </script>
</body>
</html>
