<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>خريطة المستشفيات والمراكز الصحية</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; }
        #map { width: 100%; height: 100vh; }
        .legend {
            background: white;
            padding: 10px;
            border-radius: 5px;
            box-shadow: 0 0 10px rgba(0,0,0,0.5);
            font-size: 14px;
            line-height: 1.8em;
        }
        .control-btn {
            position: absolute;
            top: 10px;
            left: 10px;
            background: white;
            padding: 10px;
            border-radius: 5px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.5);
            font-size: 14px;
            cursor: pointer;
            z-index: 1000;
        }
    </style>
</head>
<body>
    <div id="map"></div>
    <div class="control-btn" id="filter-btn">تصنيف المستشفيات</div>

    <script>
        // إعداد الخريطة
        var map = L.map('map').setView([31.9, 35.2], 12);

        // إضافة طبقة OpenStreetMap
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; OpenStreetMap contributors'
        }).addTo(map);

        // تحميل مضلع محافظة رام الله
        fetch('RamallahZones.json')
            .then(response => response.json())
            .then(data => {
                L.geoJSON(data, {
                    style: { color: "blue", weight: 2, fillColor: "cyan", fillOpacity: 0.3 }
                }).bindPopup("محافظة رام الله").addTo(map);
            })
            .catch(error => console.error("خطأ في تحميل ملف RamallahZones.json:", error));

        // بيانات المستشفيات والمراكز الصحية
        var facilities = [
            { name: "مجمع فلسطين الطبي", coordinates: [31.9063, 35.2124], type: "عام", category: "hospital" },
            { name: "مستشفى الرعاية التخصصي", coordinates: [31.9044, 35.2094], type: "خاص", category: "hospital" },
            { name: "مستشفى د. درغام", coordinates: [31.9084, 35.2064], type: "خاص", category: "hospital" },
            { name: "مركز صحي الهلال", coordinates: [31.9124, 35.2214], type: "عام", category: "health_center" },
            { name: "مستشفى الهلال الأحمر", coordinates: [31.9014, 35.2134], type: "عام", category: "hospital" },
            { name: "مستشفى الرازي", coordinates: [31.9034, 35.2174], type: "عام", category: "hospital" },
            { name: "مركز صحي الراجحي", coordinates: [31.9024, 35.2164], type: "خاص", category: "health_center" },
            { name: "مستشفى خالد", coordinates: [31.9024, 35.2214], type: "خاص", category: "hospital" }
        ];

        var markers = [];

        // عرض المستشفيات والمراكز الصحية
        function renderFacilities(filterType = null) {
            // إزالة جميع العلامات الحالية
            markers.forEach(marker => map.removeLayer(marker));
            markers = [];

            facilities.forEach(facility => {
                var color = "black"; // الافتراضي
                if (filterType === "خاص" && facility.type === "خاص") {
                    color = "blue";
                } else if (filterType === "عام" && facility.type === "عام") {
                    color = "green";
                } else if (!filterType) {
                    color = facility.type === "عام" ? "green" : "blue";
                }

                var emoji = facility.category === "hospital" ? "🏥" : "🩺";
                var iconHtml = `<span style="color:${color}; font-size: 24px;">${emoji}</span>`;

                var marker = L.divIcon({
                    className: '',
                    html: `<div style="text-align: center;">${iconHtml}</div>`,
                    iconSize: [30, 30],
                    iconAnchor: [15, 15]
                });

                var facilityMarker = L.marker(facility.coordinates, { icon: marker })
                    .bindPopup(`<b>${facility.name}</b><br>نوع: ${facility.type}`)
                    .addTo(map);

                markers.push(facilityMarker);
            });
        }

        // عرض جميع المستشفيات والمراكز الصحية مبدئيًا
        renderFacilities();

        // التعامل مع زر التصنيف
        document.getElementById("filter-btn").addEventListener("click", () => {
            var filterType = prompt("اختر تصنيف المستشفيات: خاص أو عام");
            if (filterType === "خاص" || filterType === "عام") {
                renderFacilities(filterType);
            } else if (filterType === null) {
                renderFacilities();
            } else {
                alert("الرجاء اختيار تصنيف صحيح (خاص أو عام)");
            }
        });
    </script>
</body>
</html>
