<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>خريطة المستشفيات والمراكز الصحية</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; }
        #map { width: 100%; height: 100vh; }
        .legend {
            background: white;
            padding: 10px;
            border-radius: 5px;
            box-shadow: 0 0 10px rgba(0,0,0,0.5);
            font-size: 14px;
            line-height: 1.8em;
        }
        .control-btn {
            position: absolute;
            top: 10px;
            left: 10px;
            background: white;
            padding: 10px;
            border-radius: 5px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.5);
            font-size: 14px;
            cursor: pointer;
            z-index: 1000;
        }
        .search-container {
            position: absolute;
            top: 50px;
            left: 10px;
            z-index: 1000;
            background: white;
            padding: 10px;
            border-radius: 5px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.5);
        }
    </style>
</head>
<body>
    <div id="map"></div>
    <div class="control-btn" id="filter-btn">تصنيف المستشفيات</div>
    <div class="search-container">
        <input type="text" id="search-input" placeholder="ابحث عن مستشفى أو مركز صحي" style="width: 200px; padding: 5px; border: 1px solid #ccc; border-radius: 5px;" />
    </div>

    <script>
        var map = L.map('map').setView([31.9, 35.2], 12);

        // إضافة طبقة OpenStreetMap
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; OpenStreetMap contributors'
        }).addTo(map);

        // تحميل مضلع محافظة رام الله
        fetch('RamallahZones.json')
            .then(response => response.json())
            .then(data => {
                L.geoJSON(data, {
                    style: { color: "blue", weight: 2, fillColor: "cyan", fillOpacity: 0.3 }
                }).bindPopup("محافظة رام الله").addTo(map);
            })
            .catch(error => console.error("خطأ في تحميل ملف RamallahZones.json:", error));

        var facilitiesLayer;
        var allFacilities = [];

        // تحميل المستشفيات والمراكز الصحية
        fetch('Hospitals.geojson')
            .then(response => response.json())
            .then(data => {
                facilitiesLayer = L.geoJSON(data, {
                    pointToLayer: function (feature, latlng) {
                        var type = feature.properties.type; // عام أو خاص
                        var category = feature.properties.category; // hospital أو health_center
                        var emoji = category === "hospital" ? "🏥" : "🩺";
                        var defaultColor = type === "عام" ? "green" : "blue";

                        var iconHtml = `<span style="color:${defaultColor}; font-size: 24px;">${emoji}</span>`;
                        var marker = L.divIcon({
                            className: '',
                            html: `<div style="text-align: center;">${iconHtml}</div>`,
                            iconSize: [30, 30],
                            iconAnchor: [15, 15]
                        });

                        var facilityMarker = L.marker(latlng, { icon: marker })
                            .bindPopup(`<b>${feature.properties.name}</b><br>نوع: ${type}<br>فئة: ${category}`)
                            .addTo(map);

                        allFacilities.push({ name: feature.properties.name, marker: facilityMarker });
                        return facilityMarker;
                    }
                }).addTo(map);

                // إضافة أداة البحث
                document.getElementById("search-input").addEventListener("input", function (e) {
                    var query = e.target.value.toLowerCase();
                    allFacilities.forEach(facility => {
                        if (facility.name.toLowerCase().includes(query)) {
                            map.setView(facility.marker.getLatLng(), 15);
                            facility.marker.openPopup();
                        }
                    });
                });

                // التعامل مع زر التصنيف
                document.getElementById("filter-btn").addEventListener("click", () => {
                    var filterType = prompt("اختر نوع المستشفى: خاص أو عام");
                    if (filterType === "خاص" || filterType === "عام") {
                        map.removeLayer(facilitiesLayer);
                        facilitiesLayer = L.geoJSON(data, {
                            pointToLayer: function (feature, latlng) {
                                if (feature.properties.type !== filterType) return;

                                var category = feature.properties.category;
                                var emoji = category === "hospital" ? "🏥" : "🩺";
                                var color = filterType === "عام" ? "green" : "blue";

                                var iconHtml = `<span style="color:${color}; font-size: 24px;">${emoji}</span>`;
                                var marker = L.divIcon({
                                    className: '',
                                    html: `<div style="text-align: center;">${iconHtml}</div>`,
                                    iconSize: [30, 30],
                                    iconAnchor: [15, 15]
                                });

                                return L.marker(latlng, { icon: marker })
                                    .bindPopup(`<b>${feature.properties.name}</b><br>نوع: ${filterType}<br>فئة: ${category}`);
                            }
                        }).addTo(map);
                    } else {
                        alert("الرجاء اختيار تصنيف صحيح (خاص أو عام)");
                    }
                });
            })
            .catch(error => console.error("خطأ في تحميل ملف Hospitals.geojson:", error));
    </script>
</body>
</html>
