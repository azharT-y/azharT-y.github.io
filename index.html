<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>خريطة المستشفيات والمراكز الصحية</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; }
        #map { width: 100%; height: 100vh; }
    </style>
</head>
<body>
    <div id="map"></div>

    <script>
        var map = L.map('map').setView([31.9, 35.2], 12);

        // طبقة OpenStreetMap
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; OpenStreetMap contributors'
        }).addTo(map);

        // أيقونات المستشفيات والمراكز الصحية
        var hospitalIcon = L.icon({
            iconUrl: 'https://cdn-icons-png.flaticon.com/512/2329/2329149.png', // يمكنك استبدال هذا برابط أيقونة المستشفى الحمراء
            iconSize: [30, 40],
            iconAnchor: [15, 40],
            popupAnchor: [0, -40]
        });

        var healthCenterIcon = L.icon({
            iconUrl: 'https://cdn-icons-png.flaticon.com/512/3649/3649463.png', // يمكنك استبدال هذا برابط أيقونة المركز الصحي الصفراء
            iconSize: [30, 40],
            iconAnchor: [15, 40],
            popupAnchor: [0, -40]
        });

        // تحميل المستشفيات والمراكز الصحية
        fetch('Hospitals.geojson')
            .then(response => response.json())
            .then(data => {
                var hospitalsLayer = L.geoJSON(data, {
                    pointToLayer: function (feature, latlng) {
                        // اختر الأيقونة بناءً على نوع النقطة
                        var icon = feature.properties.type === 'hospital' ? hospitalIcon : healthCenterIcon;
                        return L.marker(latlng, { icon: icon })
                            .bindPopup(`<b>${feature.properties.name}</b>`); // عرض الاسم عند الضغط
                    }
                }).addTo(map);

                // ضبط حدود الخريطة لتناسب المواقع
                map.fitBounds(hospitalsLayer.getBounds());
            })
            .catch(error => console.error("خطأ في تحميل ملف Hospitals.geojson:", error));
    </script>
</body>
</html>
{
    "type": "Feature",
    "properties": {
        "name": "مستشفى رام الله",
        "type": "hospital"
    },
    "geometry": {
        "type": "Point",
        "coordinates": [35.2, 31.9]
    }
}
