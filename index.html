<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>خريطة المستشفيات والمراكز الصحية</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; }
        #map { width: 100%; height: 100vh; }
        .legend {
            background: white;
            padding: 10px;
            border-radius: 5px;
            box-shadow: 0 0 10px rgba(0,0,0,0.5);
            font-size: 14px;
            line-height: 1.8em;
        }
        .legend span {
            display: inline-block;
            width: 20px;
            height: 20px;
            text-align: center;
            line-height: 20px;
            font-size: 18px;
        }
    </style>
</head>
<body>
    <div id="map"></div>

    <script>
        // إعداد الخريطة
        var map = L.map('map').setView([31.9, 35.2], 12);

        // إضافة طبقة OpenStreetMap
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; OpenStreetMap contributors'
        }).addTo(map);

        // تحميل مضلع محافظة رام الله
        fetch('RamallahZones.json')
            .then(response => response.json())
            .then(data => {
                L.geoJSON(data, {
                    style: { color: "blue", weight: 2, fillColor: "cyan", fillOpacity: 0.3 }
                }).bindPopup("محافظة رام الله").addTo(map);
            })
            .catch(error => console.error("خطأ في تحميل ملف RamallahZones.json:", error));

        // بيانات المستشفيات
        var facilities = [
            { name: "مجمع فلسطين الطبي", coordinates: [31.9063, 35.2124], type: "عام" },
            { name: "مستشفى الرعاية التخصصي", coordinates: [31.9044, 35.2094], type: "خاص" },
            { name: "مستشفى د. درغام", coordinates: [31.9084, 35.2064], type: "خاص" },
            { name: "مستشفى المستقبل", coordinates: [31.9124, 35.2214], type: "خاص" },
            { name: "مستشفى الهلال الأحمر", coordinates: [31.9014, 35.2134], type: "عام" },
            { name: "مستشفى الرازي", coordinates: [31.9034, 35.2174], type: "عام" },
            { name: "مستشفى مسلم التخصصي", coordinates: [31.9024, 35.2164], type: "خاص" },
            { name: "مستشفى خالد", coordinates: [31.9024, 35.2214], type: "خاص" },
            { name: "مستشفى أبو ريّا للتأهيل", coordinates: [31.9054, 35.2204], type: "عام" }
        ];

        // إضافة المستشفيات إلى الخريطة
        facilities.forEach(facility => {
            var emojiColor = facility.type === "عام" ? "blue" : "red";
            var emoji = `<span style="color:${emojiColor}; font-size: 24px;">🏥</span>`;

            // إنشاء أيقونة مخصصة لكل مستشفى
            var marker = L.divIcon({
                className: '',
                html: `<div style="text-align: center;">${emoji}</div>`,
                iconSize: [30, 30],
                iconAnchor: [15, 15]
            });

            // إضافة العلامة إلى الخريطة
            L.marker(facility.coordinates, { icon: marker })
                .bindPopup(`<b>${facility.name}</b><br>نوع المستشفى: ${facility.type}`)
                .addTo(map);
        });

        // إضافة مفتاح الخريطة (Legend)
        var legend = L.control({ position: 'bottomright' });
        legend.onAdd = function (map) {
            var div = L.DomUtil.create('div', 'legend');
            div.innerHTML += '<span style="color: blue;">🏥</span> مستشفى عام<br>';
            div.innerHTML += '<span style="color: red;">🏥</span> مستشفى خاص<br>';
            div.innerHTML += '<i style="background: cyan; border: 1px solid blue; display: inline-block; width: 20px; height: 20px;"></i> محافظة رام الله';
            return div;
        };
        legend.addTo(map);
    </script>
</body>
</html>
