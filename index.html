<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>خريطة المستشفيات ومحافظة رام الله</title>
    <!-- مكتبة Leaflet -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.7.1/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.7.1/dist/leaflet.js"></script>
    <!-- مكتبة Leaflet Search -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet-search/2.9.8/leaflet-search.min.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet-search/2.9.8/leaflet-search.min.js"></script>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; }
        #map { height: 100vh; width: 100%; }
        .legend { background: white; padding: 10px; line-height: 1.5em; border-radius: 5px; box-shadow: 0 0 10px rgba(0,0,0,0.5); }
        .legend i { width: 20px; height: 20px; float: right; margin-left: 8px; opacity: 0.9; background-size: cover; }
    </style>
</head>
<body>
    <div id="map"></div>

    <script>
        var map = L.map('map').setView([31.9, 35.2], 12);

        // خريطة OpenStreetMap
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap contributors'
        }).addTo(map);

        // أيقونات مخصصة
        var hospitalIcon = L.icon({
            iconUrl: 'https://cdn-icons-png.flaticon.com/512/3456/3456552.png',
            iconSize: [30, 30],
            iconAnchor: [15, 30],
            popupAnchor: [0, -30]
        });

        var emergencyIcon = L.icon({
            iconUrl: 'https://cdn-icons-png.flaticon.com/512/1048/1048354.png',
            iconSize: [30, 30],
            iconAnchor: [15, 30],
            popupAnchor: [0, -30]
        });

        // بيانات المستشفيات والمراكز الطبية
        var hospitals = [
            { "name": "مجمع فلسطين الطبي", "coords": [35.2048, 31.8988], "type": "hospital" },
            { "name": "مستشفى الرعاية التخصصي", "coords": [35.2050, 31.9053], "type": "hospital" },
            { "name": "مركز الطوارئ الطبي", "coords": [35.2020, 31.9010], "type": "emergency" }
        ];

        var hospitalLayer = L.layerGroup();
        hospitals.forEach(function(hospital) {
            var icon = hospital.type === "hospital" ? hospitalIcon : emergencyIcon;
            L.marker(hospital.coords, { icon: icon })
             .bindPopup(`<b>${hospital.name}</b>`)
             .addTo(hospitalLayer);
        });
        hospitalLayer.addTo(map);

        // مضلع محافظة رام الله
        var ramallahPolygon = {
            "type": "Feature",
            "properties": { "name": "محافظة رام الله" },
            "geometry": {
                "type": "Polygon",
                "coordinates": [
                    [
                        [35.190, 31.890],
                        [35.220, 31.890],
                        [35.220, 31.920],
                        [35.190, 31.920],
                        [35.190, 31.890]
                    ]
                ]
            }
        };

        L.geoJSON(ramallahPolygon, {
            style: {
                color: "blue",
                fillColor: "cyan",
                weight: 2,
                fillOpacity: 0.3
            }
        }).bindPopup("<b>محافظة رام الله</b>").addTo(map);

        // أداة البحث
        var searchControl = new L.Control.Search({
            layer: hospitalLayer,
            propertyName: 'name',
            marker: false,
            moveToLocation: function(latlng, title, map) {
                map.setView(latlng, 15);
            }
        });
        map.addControl(searchControl);

        // مفتاح الخريطة (Legend)
        var legend = L.control({ position: 'bottomleft' });
        legend.onAdd = function () {
            var div = L.DomUtil.create('div', 'legend');
            div.innerHTML += '<i style="background-image: url(https://cdn-icons-png.flaticon.com/512/3456/3456552.png);"></i> مستشفى<br>';
            div.innerHTML += '<i style="background-image: url(https://cdn-icons-png.flaticon.com/512/1048/1048354.png);"></i> مركز طوارئ<br>';
            div.innerHTML += '<i style="background: cyan;"></i> محافظة رام الله';
            return div;
        };
        legend.addTo(map);
    </script>
</body>
</html>
