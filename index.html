<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>خريطة محافظة رام الله والمستشفيات</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; }
        #map { width: 100%; height: 100vh; }
        .legend {
            background: white;
            padding: 10px;
            line-height: 1.5em;
            border-radius: 5px;
            box-shadow: 0 0 10px rgba(0,0,0,0.5);
        }
        .legend i {
            width: 30px;
            height: 30px;
            float: right;
            margin-left: 8px;
            background-size: cover;
        }
    </style>
</head>
<body>
    <div id="map"></div>

    <script>
        // إعداد الخريطة
        var map = L.map('map').setView([31.9, 35.2], 12);

        // إضافة خريطة OpenStreetMap
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; OpenStreetMap contributors'
        }).addTo(map);

        // أيقونات مخصصة
        var hospitalIcon = L.icon({
            iconUrl: 'https://cdn-icons-png.flaticon.com/512/2329/2329149.png',
            iconSize: [45, 45]
        });

        var clinicIcon = L.icon({
            iconUrl: 'https://cdn-icons-png.flaticon.com/512/2967/2967357.png',
            iconSize: [45, 45]
        });

        var emergencyIcon = L.icon({
            iconUrl: 'https://cdn-icons-png.flaticon.com/512/2844/2844036.png',
            iconSize: [45, 45]
        });

        // مضلع محافظة رام الله
        fetch('RamallahZones.json')
            .then(response => response.json())
            .then(data => {
                L.geoJSON(data, {
                    style: {
                        color: "blue",
                        weight: 2,
                        fillColor: "cyan",
                        fillOpacity: 0.4
                    }
                }).addTo(map);
            });

        // عرض المستشفيات فوق المضلع
        fetch('HealthFacititi.geojson')
            .then(response => response.json())
            .then(data => {
                L.geoJSON(data, {
                    pointToLayer: function (feature, latlng) {
                        var type = feature.properties.type || "hospital";
                        var icon = hospitalIcon;

                        if (type.toLowerCase().includes("clinic")) icon = clinicIcon;
                        if (type.toLowerCase().includes("emergency")) icon = emergencyIcon;

                        return L.marker(latlng, { icon: icon })
                            .bindPopup(`<b>${feature.properties.name || "مرفق طبي"}</b><br>النوع: ${type}`);
                    }
                }).addTo(map);
            });

        // إضافة مفتاح الخريطة
        var legend = L.control({ position: 'bottomleft' });
        legend.onAdd = function () {
            var div = L.DomUtil.create('div', 'legend');
            div.innerHTML += '<i style="background-image: url(https://cdn-icons-png.flaticon.com/512/2329/2329149.png);"></i> مستشفى<br>';
            div.innerHTML += '<i style="background-image: url(https://cdn-icons-png.flaticon.com/512/2967/2967357.png);"></i> مركز طبي<br>';
            div.innerHTML += '<i style="background-image: url(https://cdn-icons-png.flaticon.com/512/2844/2844036.png);"></i> مركز طوارئ<br>';
            div.innerHTML += '<i style="background: cyan;"></i> محافظة رام الله';
            return div;
        };
        legend.addTo(map);
    </script>
</body>
</html>

</body>
</html>
