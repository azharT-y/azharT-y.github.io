<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>خريطة المستشفيات والمراكز الصحية</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.css" />
    <style>
        body, html { margin: 0; padding: 0; height: 100%; }
        #map { width: 100%; height: 100vh; }
        .legend {
            background: white;
            padding: 10px;
            border-radius: 5px;
            box-shadow: 0 0 10px rgba(0,0,0,0.5);
            font-size: 14px;
            line-height: 1.8em;
        }
        .control-btn {
            position: absolute;
            top: 10px;
            left: 10px;
            background: white;
            padding: 10px;
            border-radius: 5px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.5);
            font-size: 14px;
            cursor: pointer;
            z-index: 1000;
        }
    </style>
</head>
<body>
    <div id="map"></div>
    <div class="control-btn" id="filter-btn">تصنيف المستشفيات</div>

    <script>
        var map = L.map('map').setView([31.9, 35.2], 12);

        // إضافة طبقة OpenStreetMap
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; OpenStreetMap contributors'
        }).addTo(map);

        // تحميل مضلع محافظة رام الله
        fetch('RamallahZones.json')
            .then(response => response.json())
            .then(data => {
                L.geoJSON(data, {
                    style: { color: "blue", weight: 2, fillColor: "cyan", fillOpacity: 0.3 }
                }).bindPopup("محافظة رام الله").addTo(map);
            })
            .catch(error => console.error("خطأ في تحميل ملف RamallahZones.json:", error));

        var markers = [];

        // تحميل المستشفيات والمراكز الصحية
        fetch('Hospitals.geojson')
            .then(response => response.json())
            .then(data => {
                // تصنيف المستشفيات والمراكز الصحية
                var facilitiesLayer = L.geoJSON(data, {
                    pointToLayer: function (feature, latlng) {
                        var type = feature.properties.type; // خاص أو عام
                        var category = feature.properties.category; // مستشفى أو مركز صحي
                        var emoji = category === "hospital" ? "🏥" : "🩺";
                        var color = type === "عام" ? "green" : "blue";

                        var iconHtml = `<span style="color:${color}; font-size: 24px;">${emoji}</span>`;
                        var marker = L.divIcon({
                            className: '',
                            html: `<div style="text-align: center;">${iconHtml}</div>`,
                            iconSize: [30, 30],
                            iconAnchor: [15, 15]
                        });

                        return L.marker(latlng, { icon: marker })
                            .bindPopup(`<b>${feature.properties.name}</b><br>نوع: ${type}<br>فئة: ${category}`);
                    }
                }).addTo(map);

                markers.push(facilitiesLayer);

                // إضافة أداة البحث
                L.Control.geocoder({
                    defaultMarkGeocode: false,
                    placeholder: "ابحث عن مستشفى أو مركز صحي",
                    geocoder: L.Control.Geocoder.nominatim()
                }).on('markgeocode', function (e) {
                    map.setView(e.geocode.center, 15);
                }).addTo(map);

                // التعامل مع زر التصنيف
                document.getElementById("filter-btn").addEventListener("click", () => {
                    var filterType = prompt("اختر تصنيف المستشفيات: خاص أو عام");
                    if (filterType === "خاص" || filterType === "عام") {
                        map.removeLayer(facilitiesLayer);
                        facilitiesLayer = L.geoJSON(data, {
                            pointToLayer: function (feature, latlng) {
                                var type = feature.properties.type;
                                if (type !== filterType) return;

                                var category = feature.properties.category;
                                var emoji = category === "hospital" ? "🏥" : "🩺";
                                var color = type === "عام" ? "green" : "blue";

                                var iconHtml = `<span style="color:${color}; font-size: 24px;">${emoji}</span>`;
                                var marker = L.divIcon({
                                    className: '',
                                    html: `<div style="text-align: center;">${iconHtml}</div>`,
                                    iconSize: [30, 30],
                                    iconAnchor: [15, 15]
                                });

                                return L.marker(latlng, { icon: marker })
                                    .bindPopup(`<b>${feature.properties.name}</b><br>نوع: ${type}<br>فئة: ${category}`);
                            }
                        }).addTo(map);
                    } else {
                        alert("الرجاء اختيار تصنيف صحيح (خاص أو عام)");
                    }
                });
            })
            .catch(error => console.error("خطأ في تحميل ملف Hospitals.geojson:", error));

        // إضافة مفتاح الخريطة (Legend)
        var legend = L.control({ position: 'bottomright' });
        legend.onAdd = function (map) {
            var div = L.DomUtil.create('div', 'legend');
            div.innerHTML += '<span style="color: green;">🏥</span> مستشفى عام<br>';
            div.innerHTML += '<span style="color: blue;">🏥</span> مستشفى خاص<br>';
            div.innerHTML += '<span>🩺</span> مركز صحي<br>';
            div.innerHTML += '<i style="background: cyan; border: 1px solid blue; display: inline-block; width: 20px; height: 20px;"></i> محافظة رام الله';
            return div;
        };
        legend.addTo(map);
    </script>
</body>
</html>
