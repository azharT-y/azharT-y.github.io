<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>خريطة المستشفيات والمراكز الصحية</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; }
        #map { width: 100%; height: 100vh; }
        .search-container {
            position: absolute;
            top: 10px;
            left: 10px;
            background: white;
            padding: 10px;
            border-radius: 5px;
            box-shadow: 0 0 10px rgba(0,0,0,0.5);
            z-index: 1000;
        }
        .legend {
            background: white;
            padding: 10px;
            border-radius: 5px;
            box-shadow: 0 0 10px rgba(0,0,0,0.5);
            font-size: 14px;
            line-height: 1.8em;
            position: absolute;
            bottom: 10px;
            right: 10px;
            z-index: 1000;
        }
        .legend span {
            display: inline-block;
            width: 20px;
            height: 20px;
            text-align: center;
            line-height: 20px;
            font-size: 18px;
        }
    </style>
</head>
<body>
    <div id="map"></div>
    <div class="search-container">
        <input type="text" id="search-input" placeholder="ابحث عن مستشفى أو مركز صحي" style="width: 200px; padding: 5px; border: 1px solid #ccc; border-radius: 5px;" />
    </div>

    <script>
        var map = L.map('map').setView([31.9, 35.2], 12);

        // إضافة طبقة OpenStreetMap
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; OpenStreetMap contributors'
        }).addTo(map);

        // تحميل مضلع محافظة رام الله
        fetch('RamallahZones.json')
            .then(response => response.json())
            .then(data => {
                L.geoJSON(data, {
                    style: { color: "blue", weight: 2, fillColor: "cyan", fillOpacity: 0.3 }
                }).bindPopup("محافظة رام الله").addTo(map);
            })
            .catch(error => console.error("خطأ في تحميل ملف RamallahZones.json:", error));

        // منشآت المستشفيات والمراكز الصحية
        var facilities = [
            { name_ar: "مجمع فلسطين الطبي", name_en: "Palestine Medical Complex", city: "رام الله", type: "Public", coordinates: [31.8988, 35.2048] },
            { name_ar: "مستشفى الرعاية التخصصي", name_en: "Care Specialist Hospital", city: "رام الله", type: "Private", coordinates: [31.9054, 35.2051] },
            { name_ar: "مستشفى دكتور ضرغام", name_en: "Dr.Dergham Hospital", city: "رام الله", type: "Private", coordinates: [31.8977, 35.2044] },
            { name_ar: "مستشفى المستقبل", name_en: "Al Mustakbal Hospital", city: "البيرة", type: "Public", coordinates: [31.9144, 35.2141] },
            { name_ar: "المركز الصحي العربي", name_en: "Arabic Health Center", city: "البيرة", type: "Public", coordinates: [31.9046, 35.2065] },
            { name_ar: "مستشفى العمري", name_en: "Al Amari Health Center", city: "البيرة", type: "Private", coordinates: [31.8946, 35.2107] },
            { name_ar: "المستشفى الاستشاري العربي", name_en: "Istishari Arab Hospital", city: "رام الله", type: "Private", coordinates: [31.9335, 35.1623] },
            { name_ar: "مركز الراجحي الطبي", name_en: "Al Rajhi Medical Center", city: "البيرة", type: "Private", coordinates: [31.8914, 35.2135] },
            { name_ar: "مستشفى الرازي", name_en: "Al Razi Hospital", city: "رام الله", type: "Private", coordinates: [31.9034, 35.2174] },
            { name_ar: "مستشفى الهلال الأحمر", name_en: "Palestinian Red Crescent Hospital", city: "رام الله", type: "Public", coordinates: [31.8994, 35.2044] },
            { name_ar: "مستشفى الناصر", name_en: "Nasser Maternity Hospital", city: "رام الله", type: "Private", coordinates: [31.9024, 35.2164] },
            { name_ar: "مستشفى خالد", name_en: "Khalid Hospital", city: "البيرة", type: "Public", coordinates: [31.9021, 35.2141] },
            { name_ar: "مستشفى أبو ريّا", name_en: "Abu Reya Rehabilitation Hospital", city: "رام الله", type: "Public", coordinates: [31.9064, 35.2114] },
            { name_ar: "مستشفى المستقبل", name_en: "Future Hospital", city: "البيرة", type: "Private", coordinates: [31.9123, 35.2156] },
            { name_ar: "مركز بيتونيا الطبي", name_en: "Beitunia Medical Center", city: "بيتونا", type: "Public", coordinates: [31.8823, 35.1764] },
            { name_ar: "مستشفى مسلم", name_en: "Muslim Hospital", city: "البيرة", type: "Private", coordinates: [31.8995, 35.2143] }
        ];

        // عرض المستشفيات والمراكز الصحية باستخدام الرموز التعبيرية
        facilities.forEach(facility => {
            var color = facility.type === "Public" ? "green" : "blue";
            var emoji = "🏥";
            var marker = L.divIcon({
                className: '',
                html: `<div style="font-size: 24px; text-align: center; color:${color};">${emoji}</div>`,
                iconSize: [30, 30],
                iconAnchor: [15, 15]
            });

            L.marker(facility.coordinates, { icon: marker })
                .bindPopup(`<b>${facility.name_ar}</b><br>${facility.name_en}<br>المدينة: ${facility.city}<br>التصنيف: ${facility.type === "Public" ? "عام" : "خاص"}`)
                .addTo(map);
        });

        // إضافة مفتاح الخريطة (Legend)
        var legend = L.control({ position: 'bottomright' });
        legend.onAdd = function () {
            var div = L.DomUtil.create('div', 'legend');
            div.innerHTML += '<span style="color: green;">🏥</span> مستشفى عام<br>';
            div.innerHTML += '<span style="color: blue;">🏥</span> مستشفى خاص<br>';
            div.innerHTML += '<i style="background: cyan; border: 1px solid blue; display: inline-block; width: 20px; height: 20px;"></i> محافظة رام الله';
            return div;
        };
        legend.addTo(map);
    </script>
</body>
</html>
